{% extends "athenas/base.html" %}
{% load static %}

{% block title %}Abrir caja{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'athenas/css/caja.css' %}">
{% endblock %}

{% block content %}
<section class="panel">
  <h1>Abrir caja</h1>

  <form method="post" class="grid-venta" style="margin-top:.75rem;">
    {% csrf_token %}

    <!-- Saldo inicial -->
    <div>
      <label for="saldo_inicial">Saldo inicial</label>
      <input
        id="saldo_inicial"
        name="saldo_inicial"
        type="number"
        step="0.01"
        min="0"
        class="form-control"
        value="{{ request.POST.saldo_inicial|default:'0.00' }}"
        required
      >
    </div>

    <div style="grid-column:1/-1;text-align:right;margin-top:.5rem;">
      <button type="submit" class="btn-primary">Abrir caja</button>
      <a class="btn" href="{% url 'caja_lista' %}">Volver a la lista</a>
      <a class="btn" href="{% url 'caja_estado' %}">Ver estado</a>
    </div>
  </form>
</section>
{% endblock %}
