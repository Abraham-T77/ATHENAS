{% extends "athenas/base.html" %}
{% load static %}

{% block title %}Abrir caja{% endblock %}

{% block extra_css %}
<link rel="stylesheet" href="{% static 'athenas/css/caja.css' %}">
{% endblock %}

{% block content %}
<section class="form-section">
  <div class="page-header">
    <h1>Abrir caja</h1>
  </div>

  <form method="post" class="form-section-content" style="margin-top:.75rem;">
    {% csrf_token %}

    <!-- Saldo inicial -->
    <div>
      <label for="saldo_inicial">Saldo inicial</label>
      <input
        id="saldo_inicial"
        name="saldo_inicial"
        type="number"
        step="0.01"
        min="0"
        class="form-control"
        value="{{ request.POST.saldo_inicial|default:'0.00' }}"
        required
      >
    </div>

    <div class="page-actions mt-3">
      <button type="submit" class="btn btn-primary">Abrir caja</button>
      <a class="btn" href="{% url 'caja_lista' %}">Volver a la lista</a>
      <a class="btn" href="{% url 'caja_estado' %}">Ver estado</a>
    </div>
  </form>
</section>
{% endblock %}
